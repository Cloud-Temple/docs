# Cas d'usage recommandés
use_cases:
  - name: Dialogue multilingue
    description: Chatbots et assistants capables de communiquer dans plusieurs langues avec détection automatique, maintien du contexte sur l'ensemble de la conversation et compréhension des spécificités linguistiques
    recommended_models:
      - Llama 3.3
      - Mistral Small 3.2
      - Qwen 3
      - Openai OSS 
      - Granite 4 

  - name: Analyse de documents longs
    description: Traitement de documents volumineux (>100 pages) avec maintien du contexte sur l'ensemble du texte, extraction d'informations clés, génération de résumés pertinents et réponse à des questions spécifiques sur le contenu
    recommended_models:
      - Gemma 3
      - Qwen next
      - Qwen 3 
      - Granite 4  # Mis à jour

  - name: Programmation et développement
    description: Génération et optimisation de code dans multiples langages, débogage, refactoring, développement de fonctionnalités complètes, compréhension des implémentations algorithmiques complexes et création de tests unitaires
    recommended_models:
      - DeepCoder
      - Qwen3 coder 
      - Granite 4
      - Devstral

  - name: Analyse visuelle
    description: Traitement direct d'images et documents visuels sans pré-traitement OCR, interprétation de diagrammes techniques, graphiques, tableaux, dessins et photos avec génération d'explications textuelles détaillées du contenu visuel
    recommended_models:
      - deepseek-OCR
      - Mistral Small 3.2
      - Gemma 3
      - Qwen2.5-VL
    
  - name: Sécurité et conformité
    description: Applications nécessitant des capacités spécifiques en matière de sécurité ; filtrage de contenu sensible, traçabilité des raisonnements, vérification RGPD/HDS, minimisation des risques, analyse des vulnérabilités et respect des réglementations sectorielles
    recommended_models:
      - Granite Guardian
      - Granite 4
      - Devstral
      - Mistral Small 3.2
      - Magistral 24b

  - name: Déploiements légers et embarqués
    description: Applications nécessitant une empreinte minimale en ressources, déploiement sur appareils à capacité limitée, inférence en temps réel sur CPU standard et intégration dans des systèmes embarqués ou IoT
    recommended_models:
      - Gemma 3
      - Granite Guardian
      - Granite 4 tiny
      - DeepSeek-OCR
